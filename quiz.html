<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Management Exam (Hard Mode)</title>
    <style>
        :root {
            --primary: #b91c1c; /* Dark Red for Hard Mode */
            --success: #15803d;
            --error: #991b1b;
            --background: #f3f4f6;
            --card: #ffffff;
            --text: #111827;
        }

        body {
            font-family: 'Georgia', serif; /* Serif font for academic feel */
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card);
            border-radius: 4px;
            border-top: 6px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.75rem;
            margin: 0;
            color: #1f2937;
        }

        .tag {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: bold;
            font-family: sans-serif;
        }

        .progress {
            font-family: sans-serif;
            color: #6b7280;
            font-weight: 500;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            gap: 0.75rem;
        }

        .option-btn {
            background-color: #fff;
            border: 1px solid #d1d5db;
            padding: 1.25rem;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            font-family: sans-serif;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #fef2f2;
        }

        .option-btn.correct {
            border-color: var(--success);
            background-color: #dcfce7;
            color: #14532d;
        }

        .option-btn.incorrect {
            border-color: var(--error);
            background-color: #fee2e2;
            color: #7f1d1d;
        }

        .footer {
            margin-top: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: sans-serif;
        }

        #next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 2px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            font-weight: 600;
        }

        #next-btn:hover {
            background-color: #991b1b;
        }

        .results-view {
            text-align: center;
            display: none;
        }

        .results-score {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 1rem 0;
            font-family: sans-serif;
        }
        
        .restart-btn {
            background-color: #374151;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .restart-btn:hover {
            background-color: #1f2937;
        }

        .restart-btn.secondary {
            background-color: #6b7280;
        }

        .restart-btn.secondary:hover {
            background-color: #4b5563;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
    </style>
</head>

    // Shuffle array using Fisher-Yates algorithm
    function shuffle(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function initQuiz(questions) {
        activeQuestions = shuffle(questions);
        currentQuestion = 0;
        score = 0;
        wrongQuestions = [];
        scoreEl.innerText = score;
        quizBox.style.display = "block";
        resultsBox.style.display = "none";
        loadQuestion();
    }

    function loadQuestion() {
        const q = activeQuestions[currentQuestion];
        questionEl.innerText = q.q;
        progressEl.innerText = `${currentQuestion + 1} / ${activeQuestions.length}`;
        optionsEl.innerHTML = "";
        hasAnswered = false;
        nextBtn.style.display = "none";

        q.o.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.classList.add("option-btn");
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btn) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQ = activeQuestions[currentQuestion];
        const correctIndex = currentQ.a;
        const buttons = optionsEl.querySelectorAll(".option-btn");

        if (selectedIndex === correctIndex) {
            btn.classList.add("correct");
            score++;
            scoreEl.innerText = score;
        } else {
            btn.classList.add("incorrect");
            buttons[correctIndex].classList.add("correct");
            wrongQuestions.push(currentQ);
        }
        
        buttons.forEach(b => b.disabled = true);
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < activeQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizBox.style.display = "none";
        resultsBox.style.display = "block";
        const percentage = Math.round((score / activeQuestions.length) * 100);
        finalScoreEl.innerText = `${percentage}%`;
        finalStatsEl.innerText = `You got ${score} out of ${activeQuestions.length} correct.`;
        
        if (wrongQuestions.length > 0) {
            retryWrongBtn.style.display = "inline-block";
            retryWrongBtn.innerText = `Retry Wrong Questions (${wrongQuestions.length})`;
        } else {
            retryWrongBtn.style.display = "none";
        }
    }

    function restartFull() {
        initQuiz(quizData);
    }

    function retryWrong() {
        if (wrongQuestions.length > 0) {
            initQuiz(wrongQuestions);
        }
    }

    // Start the quiz with shuffled questions
    initQuiz(quizData);
</script>

</body>
</html>
